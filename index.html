<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Récitations du Coran - Sourates</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 20px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        }
        
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: white;
        }
        
        .card-number {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 5px;
        }
        
        .card-title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .card-arabic {
            font-size: 1.4em;
            text-align: right;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .card-transliteration {
            font-size: 0.95em;
            opacity: 0.9;
            font-style: italic;
        }
        
        .card-body {
            padding: 20px;
        }
        
        audio {
            width: 100%;
            margin-bottom: 15px;
            border-radius: 6px;
        }
        
        .download-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            text-align: center;
            transition: opacity 0.3s ease;
            width: 100%;
        }
        
        .download-btn:hover {
            opacity: 0.9;
        }
        
        footer {
            text-align: center;
            color: white;
            padding: 20px;
            margin-top: 40px;
            opacity: 0.8;
        }
        
        .search-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #667eea;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📖 Récitations du Coran</h1>
            <p class="subtitle">Sourates complètes avec audio haute qualité</p>
        </header>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Chercher une sourate...">
        </div>
        
        <div class="grid" id="souratGrid">
            <!-- Les cartes des sourates seront générées ici par JavaScript -->
        </div>
        
        <footer>
            <p>© 2026 - Tous les droits réservés</p>
        </footer>
    </div>
    
    <script>
        // Données des sourates
        const sourates = [
            { num: 87, name: "Al-A^la", arabic: "سورة الأعلى", transliteration: "sourate al-Aʿlā", file: "Récitation de سورة الأعلى sourate al-A%5Ela (la sourate 87).mp3" },
            { num: 88, name: "Al-Ghachiyah", arabic: "سورة الغاشية", transliteration: "sourate al-Ghachiyah", file: "Récitation de سورة الغاشية sourate al-Ghachiyah (la sourate 88).mp3" },
            { num: 89, name: "Al-Fajr", arabic: "سورة الفجر", transliteration: "sourate al-Fajr", file: "Récitation de سورة الفجر sourate al-Fajr (la sourate 89).mp3" },
            { num: 90, name: "Al-Balad", arabic: "سورة البلد", transliteration: "sourate al-Balad", file: "Récitation de سورة البلد sourate al-Balad (la sourate 90).mp3" },
            { num: 91, name: "Ash-Chams", arabic: "سورة الشمس", transliteration: "sourate ach-Chams", file: "Récitation de سورة الشمس sourate ach-Chams (la sourate 91).mp3" },
            { num: 92, name: "Al-Layl", arabic: "سورة الليل", transliteration: "sourate al-Layl", file: "Récitation de سورة الليل sourate al-Layl (la sourate 92).mp3" },
            { num: 93, name: "Ad-Douha", arabic: "سورة الضحى", transliteration: "sourate Ad-Douha", file: "Récitation de سورة الضحى sourate Ad-Douha (la sourate 93).mp3" },
            { num: 94, name: "Ash-Charh", arabic: "سورة الشرح", transliteration: "sourate ach-Charh", file: "Récitation de سورة الشرح sourate ach-Charh (la sourate 94).mp3" },
            { num: 95, name: "At-Tin", arabic: "سورة التين", transliteration: "sourate at-Tin", file: "Récitation de سورة التين sourate at-Tin (la sourate 95).mp3" },
            { num: 96, name: "Al-Alaq", arabic: "سورة العلق", transliteration: "sourate al-Alaq", file: "Récitation de سورة العلق sourate al-%5EAlaq (la sourate 96).mp3" },
            { num: 97, name: "Al-Qadr", arabic: "سورة القدر", transliteration: "sourate al-Qadr", file: "Récitation de سورة القدر sourate al-Qadr (la sourate 97).mp3" },
            { num: 98, name: "Al-Bayyinah", arabic: "سورة البيّنة", transliteration: "sourate al-Bayyinah", file: "Récitation de سورة البيّنة sourate al-Bayyinah (la sourate 98).mp3" },
            { num: 99, name: "Az-Zalzalah", arabic: "سورة الزلزلة", transliteration: "sourate az-Zalzalah", file: "Récitation de سورة الزلزلة sourate az-Zalzalah (la sourate 99).mp3" },
            { num: 100, name: "Al-Adiyat", arabic: "سورة العاديات", transliteration: "sourate al-Adiyat", file: "Récitation de سورة العاديات sourate al-%5EAdiyat (la sourate 100).mp3" },
            { num: 101, name: "Al-Qariʿah", arabic: "سورة القارعة", transliteration: "sourate al-Qari^ah", file: "Récitation de سورة القارعة sourate al-Qari%5Eah (la sourate 101).mp3" },
            { num: 102, name: "At-Takathour", arabic: "سورة التكاثر", transliteration: "sourate at-Takathour", file: "Récitation de سورة التكاثر sourate at-Takathour (la sourate 102).mp3" },
            { num: 103, name: "Al-Asr", arabic: "سورة العصر", transliteration: "sourate al-Asr", file: "Récitation de سورة العصر sourate al-%5EAsr (la sourate 103).mp3" },
            { num: 104, name: "Al-Houmazah", arabic: "سورة الهُمَزَة", transliteration: "sourate al-Houmazah", file: "Récitation de سورة الهُمَزَة sourate al-Houmazah (la sourate 104).mp3" },
            { num: 105, name: "Al-Fil", arabic: "سورة الفيل", transliteration: "sourate al-Fil", file: "Récitation de سورة الفيل sourate al-Fil (la sourate 105).mp3" },
            { num: 106, name: "Qouraych", arabic: "سورة قريش", transliteration: "sourate Qouraych", file: "Récitation de سورة قريش sourate Qouraych (la sourate 106).mp3" },
            { num: 107, name: "Al-Maʿoun", arabic: "سورة الماعون", transliteration: "sourate al-Ma^oun", file: "Récitation de سورة الماعون sourate al-Ma%5Eoun (la sourate 107).mp3" },
            { num: 108, name: "Al-Kawthar", arabic: "سورة الكوثر", transliteration: "sourate al-Kawthar", file: "Récitation de سورة الكوثر sourate al-Kawthar (la sourate 108).mp3" },
            { num: 109, name: "Al-Kafiroun", arabic: "سورة الكافرون", transliteration: "sourate al-Kafiroun", file: "Récitation de سورة الكافرون sourate al-Kafiroun (la sourate 109).mp3" },
            { num: 110, name: "An-Nasr", arabic: "سورة النصر", transliteration: "sourate an-Nasr", file: "Récitation de سورة النصر sourate an-Nasr (la sourate 110).mp3" },
            { num: 111, name: "Al-Masad", arabic: "سورة المسد", transliteration: "sourate al-Masad", file: "Récitation de سورة المسد sourate al-Ma%C3%A7ad (la sourate 111).mp3" },
            { num: 112, name: "Al-Ikhlas", arabic: "سورة الإخلاص", transliteration: "sourate al-Ikhlas", file: "Récitation de سورة الإخلاص sourate al-Ikhlas (la sourate 112).mp3" },
            { num: 113, name: "Al-Falaq", arabic: "سورة الفلق", transliteration: "sourate al-Falaq", file: "Récitation de سورة الفلق sourate al-Falaq (la sourate 113).mp3" }
        ];
        
        const grid = document.getElementById('souratGrid');
        const searchInput = document.getElementById('searchInput');
        
        function renderSourates(souratesToShow) {
            grid.innerHTML = souratesToShow.map(sourate => `
                <div class="card">
                    <div class="card-header">
                        <div class="card-number">Sourate #${sourate.num}</div>
                        <div class="card-title">${sourate.name}</div>
                        <div class="card-arabic">${sourate.arabic}</div>
                        <div class="card-transliteration">${sourate.transliteration}</div>
                    </div>
                    <div class="card-body">
                        <audio controls>
                            <source src="${sourate.file}" type="audio/mpeg">
                            Votre navigateur ne supporte pas l'élément audio.
                        </audio>
                        <a href="${sourate.file}" download class="download-btn">📥 Télécharger</a>
                    </div>
                </div>
            `).join('');
        }
        
        // Rendu initial
        renderSourates(sourates);
        
        // Fonction de recherche
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = sourates.filter(sourate => 
                sourate.name.toLowerCase().includes(searchTerm) ||
                sourate.arabic.includes(searchTerm) ||
                sourate.transliteration.toLowerCase().includes(searchTerm) ||
                sourate.num.toString().includes(searchTerm)
            );
            renderSourates(filtered);
        });
    </script>
</body>
</html>
